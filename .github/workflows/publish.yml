name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "rollup.config.js"
      - "tsconfig.json"

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version is already published
        id: version_check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view qr-hover-link version 2>/dev/null || echo "none")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL is already on npm — skipping publish."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "New version $LOCAL (was $PUBLISHED) — will publish."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
